[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -ra --strict-config --strict-markers -n auto --dist loadfile
xfail_strict = true
filterwarnings =
    ignore:'maxsplit' is passed as positional argument:DeprecationWarning:gherkin\.gherkin_line
markers =
    smoke: fast smoke coverage for critical routes
    regression: broader feature coverage
    ui: focused cross-page workflows
    perf: lightweight browser-side performance guardrails, not load testing
    bdd: business-readable BDD scenarios backed by the same Playwright framework
    quarantined(reason): known-flaky or blocked test excluded from normal runs unless INCLUDE_QUARANTINED=1
    preserve_state: skip automatic API reset/seed baseline for a test that must manage state itself
