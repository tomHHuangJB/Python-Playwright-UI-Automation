name: Bootstrap LocalAutomationApp Test Stack
description: Set up Python, Node, Java, LocalAutomationApp, and repo quality checks for CI

inputs:
  local-automation-app-ssh-key:
    description: SSH key used to check out the LocalAutomationApp repository
    required: true

runs:
  using: composite
  steps:
    - name: Check out LocalAutomationApp
      uses: actions/checkout@v4
      with:
        repository: tomHHuangJB/LocalAutomationApp
        ssh-key: ${{ inputs.local-automation-app-ssh-key }}
        path: LocalAutomationApp

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "21"

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Allure commandline
      shell: bash
      run: npm install -g allure-commandline

    - name: Install Playwright browser
      shell: bash
      run: python -m playwright install --with-deps chromium

    - name: Install LocalAutomationApp backend dependencies
      shell: bash
      working-directory: LocalAutomationApp/backend
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    - name: Build LocalAutomationApp backend
      shell: bash
      working-directory: LocalAutomationApp/backend
      run: npm run build

    - name: Install LocalAutomationApp frontend dependencies
      shell: bash
      working-directory: LocalAutomationApp/frontend
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    - name: Build LocalAutomationApp frontend
      shell: bash
      working-directory: LocalAutomationApp/frontend
      run: VITE_API_URL=http://localhost:3001 npm run build

    - name: Start LocalAutomationApp backend
      shell: bash
      working-directory: LocalAutomationApp/backend
      run: node dist/index.js &

    - name: Start LocalAutomationApp frontend
      shell: bash
      working-directory: LocalAutomationApp/frontend
      run: npx serve -s dist -l 5173 &

    - name: Wait for LocalAutomationApp
      shell: bash
      run: |
        for i in {1..30}; do
          if curl -fsS http://localhost:3001/health >/dev/null && curl -fsS http://localhost:5173 >/dev/null; then
            echo "LocalAutomationApp is up"
            exit 0
          fi
          sleep 2
        done
        echo "LocalAutomationApp did not start in time"
        exit 1

    - name: Verify Python sources compile
      shell: bash
      run: python -m compileall .

    - name: Prepare report directories
      shell: bash
      run: mkdir -p allure-results junit

    - name: Run quality checks
      shell: bash
      run: bash ./scripts/run_quality_checks.sh
