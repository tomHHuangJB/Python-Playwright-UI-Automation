name: Python Playwright Main

on:
  push:
    branches:
      - main

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap test stack
        uses: ./.github/actions/bootstrap-localautomationapp
        with:
          local-automation-app-ssh-key: ${{ secrets.LOCAL_AUTOMATION_APP_SSH_KEY }}

      - name: Run smoke, regression, UI, and BDD tests
        env:
          BASE_UI_URL: http://localhost:5173
          BASE_API_URL: http://localhost:3001
          HEADLESS: "true"
        run: bash ./scripts/run_pytest_layer.sh core --alluredir=allure-results --junitxml=junit/ui-suite.xml

      - name: Run browser performance checks
        env:
          BASE_UI_URL: http://localhost:5173
          BASE_API_URL: http://localhost:3001
          HEADLESS: "true"
          PERF_DOM_CONTENT_LOADED_MAX_MS: "4000"
          PERF_NAVIGATION_MAX_MS: "6000"
        run: bash ./scripts/run_pytest_layer.sh perf --alluredir=allure-results --junitxml=junit/perf-suite.xml

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Publish workflow summary
        if: always()
        run: |
          {
            echo "## Python Playwright Main Summary"
            echo
            echo "- Suites: smoke, regression, UI, BDD, performance"
            echo "- UI target: http://localhost:5173"
            echo "- API target: http://localhost:3001"
            echo "- Allure report artifact: \`python-playwright-full-suite-allure-report\`"
            echo "- Raw Allure results artifact: \`python-playwright-full-suite-allure-results\`"
            echo "- JUnit XML artifact: \`python-playwright-full-suite-junit-results\`"
            echo "- Playwright artifact bundle: \`python-playwright-full-suite-artifacts\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full-suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-full-suite-artifacts
          path: artifacts
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-full-suite-allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-full-suite-allure-report
          path: allure-report
          if-no-files-found: ignore

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-full-suite-junit-results
          path: junit
          if-no-files-found: ignore
