name: Python Playwright CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out LocalAutomationApp
        uses: actions/checkout@v4
        with:
          repository: tomHHuangJB/LocalAutomationApp
          ssh-key: ${{ secrets.LOCAL_AUTOMATION_APP_SSH_KEY }}
          path: LocalAutomationApp

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Install LocalAutomationApp backend dependencies
        working-directory: LocalAutomationApp/backend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build LocalAutomationApp backend
        working-directory: LocalAutomationApp/backend
        run: npm run build

      - name: Install LocalAutomationApp frontend dependencies
        working-directory: LocalAutomationApp/frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build LocalAutomationApp frontend
        working-directory: LocalAutomationApp/frontend
        run: VITE_API_URL=http://localhost:3001 npm run build

      - name: Start LocalAutomationApp backend
        working-directory: LocalAutomationApp/backend
        run: node dist/index.js &

      - name: Start LocalAutomationApp frontend
        working-directory: LocalAutomationApp/frontend
        run: npx serve -s dist -l 5173 &

      - name: Wait for LocalAutomationApp
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001/health >/dev/null && curl -fsS http://localhost:5173 >/dev/null; then
              echo "LocalAutomationApp is up"
              exit 0
            fi
            sleep 2
          done
          echo "LocalAutomationApp did not start in time"
          exit 1

      - name: Verify Python sources compile
        run: python -m compileall .

      - name: Run smoke tests
        env:
          BASE_UI_URL: http://localhost:5173
          BASE_API_URL: http://localhost:3001
          HEADLESS: "true"
        run: pytest tests/smoke -m smoke

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-smoke-artifacts
          path: artifacts
          if-no-files-found: ignore

  full-suite:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out LocalAutomationApp
        uses: actions/checkout@v4
        with:
          repository: tomHHuangJB/LocalAutomationApp
          ssh-key: ${{ secrets.LOCAL_AUTOMATION_APP_SSH_KEY }}
          path: LocalAutomationApp

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Install LocalAutomationApp backend dependencies
        working-directory: LocalAutomationApp/backend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build LocalAutomationApp backend
        working-directory: LocalAutomationApp/backend
        run: npm run build

      - name: Install LocalAutomationApp frontend dependencies
        working-directory: LocalAutomationApp/frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build LocalAutomationApp frontend
        working-directory: LocalAutomationApp/frontend
        run: VITE_API_URL=http://localhost:3001 npm run build

      - name: Start LocalAutomationApp backend
        working-directory: LocalAutomationApp/backend
        run: node dist/index.js &

      - name: Start LocalAutomationApp frontend
        working-directory: LocalAutomationApp/frontend
        run: npx serve -s dist -l 5173 &

      - name: Wait for LocalAutomationApp
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001/health >/dev/null && curl -fsS http://localhost:5173 >/dev/null; then
              echo "LocalAutomationApp is up"
              exit 0
            fi
            sleep 2
          done
          echo "LocalAutomationApp did not start in time"
          exit 1

      - name: Verify Python sources compile
        run: python -m compileall .

      - name: Run regression and UI tests
        env:
          BASE_UI_URL: http://localhost:5173
          BASE_API_URL: http://localhost:3001
          HEADLESS: "true"
        run: pytest tests/regression tests/ui -m "regression or ui"

      - name: Run browser performance checks
        env:
          BASE_UI_URL: http://localhost:5173
          BASE_API_URL: http://localhost:3001
          HEADLESS: "true"
          PERF_DOM_CONTENT_LOADED_MAX_MS: "4000"
          PERF_NAVIGATION_MAX_MS: "6000"
        run: pytest tests/perf -m perf

      - name: Upload full-suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-full-suite-artifacts
          path: artifacts
          if-no-files-found: ignore
