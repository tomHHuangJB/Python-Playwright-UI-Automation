name: Python Playwright PR

on:
  pull_request:
    branches:
      - "**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap test stack
        uses: ./.github/actions/bootstrap-localautomationapp
        with:
          local-automation-app-ssh-key: ${{ secrets.LOCAL_AUTOMATION_APP_SSH_KEY }}

      - name: Run smoke tests
        env:
          BASE_UI_URL: http://localhost:5173
          BASE_API_URL: http://localhost:3001
          HEADLESS: "true"
        run: pytest tests/smoke -m smoke --alluredir=allure-results

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-smoke-artifacts
          path: artifacts
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-smoke-allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-smoke-allure-report
          path: allure-report
          if-no-files-found: ignore
