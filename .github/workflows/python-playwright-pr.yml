name: Python Playwright PR

on:
  pull_request:
    branches:
      - "**"

concurrency:
  group: python-playwright-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap test stack
        uses: ./.github/actions/bootstrap-localautomationapp
        with:
          local-automation-app-ssh-key: ${{ secrets.LOCAL_AUTOMATION_APP_SSH_KEY }}

      - name: Render suite catalog
        run: |
          python scripts/render_suite_catalog.py > suite-catalog/suite-catalog.md
          python scripts/render_suite_catalog.py --format json > suite-catalog/suite-catalog.json
          python scripts/render_suite_catalog.py --format csv > suite-catalog/suite-catalog.csv

      - name: Render quarantine report
        run: |
          python scripts/render_quarantine_report.py > quarantine-report/quarantine-report.md
          python scripts/render_quarantine_report.py --format json > quarantine-report/quarantine-report.json
          python scripts/render_quarantine_report.py --format csv > quarantine-report/quarantine-report.csv

      - name: Run smoke, regression, UI, and BDD tests
        env:
          BASE_UI_URL: http://localhost:5173
          BASE_API_URL: http://localhost:3001
          HEADLESS: "true"
        run: bash ./scripts/run_pytest_layer.sh core --alluredir=allure-results --junitxml=junit/ui-suite.xml

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Publish workflow summary
        if: always()
        run: |
          python scripts/render_ci_summary.py \
            --title "Python Playwright PR Core Summary" \
            --ui-url "http://localhost:5173" \
            --api-url "http://localhost:3001" \
            --suite-catalog-json suite-catalog/suite-catalog.json \
            --quarantine-report-json quarantine-report/quarantine-report.json \
            --allure-report-artifact "python-playwright-pr-core-allure-report" \
            --allure-results-artifact "python-playwright-pr-core-allure-results" \
            --junit-artifact "python-playwright-pr-core-junit-results" \
            --suite-catalog-artifact "python-playwright-pr-suite-catalog" \
            --quarantine-report-artifact "python-playwright-pr-quarantine-report" \
            --playwright-artifact "python-playwright-pr-core-artifacts" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-core-artifacts
          path: artifacts
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-core-allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-core-allure-report
          path: allure-report
          if-no-files-found: ignore

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-core-junit-results
          path: junit
          if-no-files-found: ignore

      - name: Upload suite catalog
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-suite-catalog
          path: suite-catalog
          if-no-files-found: ignore

      - name: Upload quarantine report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-quarantine-report
          path: quarantine-report
          if-no-files-found: ignore

  perf-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap test stack
        uses: ./.github/actions/bootstrap-localautomationapp
        with:
          local-automation-app-ssh-key: ${{ secrets.LOCAL_AUTOMATION_APP_SSH_KEY }}

      - name: Render suite catalog
        run: |
          python scripts/render_suite_catalog.py > suite-catalog/suite-catalog.md
          python scripts/render_suite_catalog.py --format json > suite-catalog/suite-catalog.json
          python scripts/render_suite_catalog.py --format csv > suite-catalog/suite-catalog.csv

      - name: Render quarantine report
        run: |
          python scripts/render_quarantine_report.py > quarantine-report/quarantine-report.md
          python scripts/render_quarantine_report.py --format json > quarantine-report/quarantine-report.json
          python scripts/render_quarantine_report.py --format csv > quarantine-report/quarantine-report.csv

      - name: Run browser performance checks
        env:
          BASE_UI_URL: http://localhost:5173
          BASE_API_URL: http://localhost:3001
          HEADLESS: "true"
          PERF_DOM_CONTENT_LOADED_MAX_MS: "4000"
          PERF_NAVIGATION_MAX_MS: "6000"
        run: bash ./scripts/run_pytest_layer.sh perf --alluredir=allure-results --junitxml=junit/perf-suite.xml

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Publish workflow summary
        if: always()
        run: |
          python scripts/render_ci_summary.py \
            --title "Python Playwright PR Perf Summary" \
            --ui-url "http://localhost:5173" \
            --api-url "http://localhost:3001" \
            --suite-catalog-json suite-catalog/suite-catalog.json \
            --quarantine-report-json quarantine-report/quarantine-report.json \
            --allure-report-artifact "python-playwright-pr-perf-allure-report" \
            --allure-results-artifact "python-playwright-pr-perf-allure-results" \
            --junit-artifact "python-playwright-pr-perf-junit-results" \
            --suite-catalog-artifact "python-playwright-pr-suite-catalog" \
            --quarantine-report-artifact "python-playwright-pr-quarantine-report" \
            --playwright-artifact "python-playwright-pr-perf-artifacts" \
            >> "$GITHUB_STEP_SUMMARY"

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-perf-artifacts
          path: artifacts
          if-no-files-found: ignore

      - name: Upload perf Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-perf-allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload perf Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-perf-allure-report
          path: allure-report
          if-no-files-found: ignore

      - name: Upload perf JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-perf-junit-results
          path: junit
          if-no-files-found: ignore
