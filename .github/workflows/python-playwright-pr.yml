name: Python Playwright PR

on:
  pull_request:
    branches:
      - "**"

jobs:
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap test stack
        uses: ./.github/actions/bootstrap-localautomationapp
        with:
          local-automation-app-ssh-key: ${{ secrets.LOCAL_AUTOMATION_APP_SSH_KEY }}

      - name: Run smoke, regression, UI, and BDD tests
        env:
          BASE_UI_URL: http://localhost:5173
          BASE_API_URL: http://localhost:3001
          HEADLESS: "true"
        run: pytest tests/smoke tests/regression tests/ui tests/bdd -m "smoke or regression or ui or bdd" --alluredir=allure-results --junitxml=junit/ui-suite.xml

      - name: Run browser performance checks
        env:
          BASE_UI_URL: http://localhost:5173
          BASE_API_URL: http://localhost:3001
          HEADLESS: "true"
          PERF_DOM_CONTENT_LOADED_MAX_MS: "4000"
          PERF_NAVIGATION_MAX_MS: "6000"
        run: pytest tests/perf -m perf --alluredir=allure-results --junitxml=junit/perf-suite.xml

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Publish workflow summary
        if: always()
        run: |
          {
            echo "## Python Playwright PR Summary"
            echo
            echo "- Suites: smoke, regression, UI, BDD, performance"
            echo "- UI target: http://localhost:5173"
            echo "- API target: http://localhost:3001"
            echo "- Allure report artifact: \`python-playwright-pr-allure-report\`"
            echo "- Raw Allure results artifact: \`python-playwright-pr-allure-results\`"
            echo "- JUnit XML artifact: \`python-playwright-pr-junit-results\`"
            echo "- Playwright artifact bundle: \`python-playwright-pr-artifacts\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-artifacts
          path: artifacts
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-allure-report
          path: allure-report
          if-no-files-found: ignore

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-playwright-pr-junit-results
          path: junit
          if-no-files-found: ignore
